<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <input type="text" id="display" readonly />
      <div class="buttons">
        <button class="task button">AC</button>
        <button class="task button" onclick="addOp('/')">/</button>
        <button class="task button" onclick="addOp('*')">*</button>
        <button class="task button">C</button>

        <button class="button">7</button>
        <button class="button">8</button>
        <button class="button">9</button>
        <button class="task button" onclick="addOp('+')">+</button>

        <button class="button">4</button>
        <button class="button">5</button>
        <button class="button">6</button>
        <button class="task button" onclick="addOp('-')">-</button>

        <button class="button">1</button>
        <button class="button">2</button>
        <button class="button">3</button>
        <button class="task button">%</button>

        <button class="button">00</button>
        <button class="button">0</button>
        <button class="button">.</button>
        <button class="result button" onclick="calc()">=</button>
      </div>
    </div>
    <div id="historyContainer">
    <h2>Create your History</h2>
    <div id="CalcHistory"></div>
    <button id="clearHistoryBtn">Clear History</button>
</div>
    

    <script src="script.js"></script>
  </body>
</html>
